# Application name used in logs and Spring Boot metadata
spring.application.name=stepListDemo

# HTTP port for the embedded Tomcat server
server.port=8080

# Step list for order processing API (/api/orders/process)
# Format: JSON array of { "name": "stepKey", "class": "fully.qualified.BusinessClass" }
# Steps execute in the order listed here.
# Controller reads from StepUtils.processOrderStepList, populated at startup by PostBootConfigurations.
processOrderSteps=[{"name":"validateRequest","class":"com.example.steplistdemo.business.ValidateRequestBusiness"},{"name":"processOrder","class":"com.example.steplistdemo.business.ProcessOrderBusiness"},{"name":"buildResponse","class":"com.example.steplistdemo.business.BuildResponseBusiness"}]
